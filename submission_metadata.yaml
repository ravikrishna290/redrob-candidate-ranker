# Redrob Hackathon — Submission Metadata
# Fill in your team details before committing.

# ============================================================================
# Team identity
# ============================================================================
team_name: "your-team-name-here"  # Used in leaderboard and announcements
primary_contact:
  name: "Full Name"
  email: "primary@example.com"   # Used for all organizer communication
  phone: "+91-XXXXXXXXXX"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Full Name"
    email: "primary@example.com"
    role: "ML Engineer"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/YOUR_USERNAME/YOUR_REPO"
# Required. Set repo to public, or invite organizers at Stage 3.
sandbox_link: "https://github.com/YOUR_USERNAME/YOUR_REPO"
# Using the Dockerfile recipe provided in the README.md

reproduce_command: "python main.py --jd job_description.docx --candidates candidates.jsonl --output team_redrob.csv"
# The single command that produces the final submission.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows PC"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.10.11"
  os: "Windows"
  uses_gpu_for_inference: false                 # Must be false
  has_network_during_ranking: false             # Must be false
  pre_computation_required: true
  pre_computation_time_minutes: 40              # Offline embedding generation takes ~40 minutes

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Cursor"

ai_usage_summary: |
  Used Gemini as an interactive coding assistant for designing the modular structure, refactoring files, and validating candidate metrics. Autocomplete assisted in code writing. No candidate data was sent to hosted APIs during the ranking step.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A two-stage candidate retrieval and ranking engine. First, precomputed semantic text embeddings (BAAI/bge-small-en-v1.5) are used to perform cosine similarity search. Next, candidate features are evaluated for skill alignment (with synonym expansion), stability, and location/salary behavioral metrics. An explicit trap detector drops fake candidate profiles (honeypots) to 0.0 relevance. Finally, the top 500 candidates are reranked using a Cross-Encoder (ms-marco-MiniLM-L-6-v2) to optimize NDCG and MAP metrics. Total runtime is under 35 seconds.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
